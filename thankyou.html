<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Airsell Cargo - Thank You</title>
  <link rel="stylesheet" href="style.css"> <!-- keep consistent branding -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      text-align: center;
      padding: 50px;
    }
    .thankyou-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
      padding: 40px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #d32f2f; /* red accent to match your portal */
    }
    p {
      font-size: 1.1em;
      color: #333;
    }
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #d32f2f;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    a.button:hover {
      background: #b71c1c;
    }
  </style>
</head>
<body>
  <div class="thankyou-box">
    <h1>Thank You!</h1>
    <p>Your request has been received by Airsell Cargo.</p>
    <p>Our team will review your inquiry and get back to you shortly.</p>
    <a href="index.html" class="button">Return to Home</a>
  </div>
</body>
</html>
